name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang-format \
            clang-tidy \
            cmake \
            g++ \
            ninja-build \
            pkg-config \
            qt6-base-dev

      - name: Format check
        run: |
          cmake --preset dev
          cmake --build --preset dev --target format-check

      - name: Configure
        run: cmake --preset ci

      - name: Build
        run: cmake --build --preset ci --parallel

      - name: Run tests
        run: ctest --preset ci
