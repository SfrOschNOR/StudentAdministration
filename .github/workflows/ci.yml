name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang-format \
            clang-tidy \
            cmake \
            g++ \
            ninja-build \
            pkg-config \
            qt6-base-dev

      - name: Format check
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="origin/${{ github.base_ref }}"
            git fetch origin "${{ github.base_ref }}"
          else
            BASE_REF="$(git rev-list --max-parents=0 HEAD)"
          fi
          CHANGED_FILES="$(git diff --name-only "${BASE_REF}"...HEAD -- '*.h' '*.cpp')"
          if [ -z "${CHANGED_FILES}" ]; then
            echo "No changed C++ files to format-check."
            exit 0
          fi
          echo "Checking formatting for:"
          printf '%s\n' "${CHANGED_FILES}"
          clang-format --dry-run --Werror ${CHANGED_FILES}

      - name: Configure
        run: cmake --preset ci

      - name: Build
        run: cmake --build --preset ci --parallel

      - name: Run tests
        run: ctest --preset ci

  sanitizer-tests:
    runs-on: ubuntu-latest

    env:
      QT_QPA_PLATFORM: offscreen
      ASAN_OPTIONS: detect_leaks=0
      UBSAN_OPTIONS: print_stacktrace=1

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            g++ \
            ninja-build \
            pkg-config \
            qt6-base-dev

      - name: Configure
        run: cmake --preset sanitizers

      - name: Build
        run: cmake --build --preset sanitizers --parallel

      - name: Run tests
        run: ctest --preset sanitizers
